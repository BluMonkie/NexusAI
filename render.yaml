services:
  - type: web
    name: nexus-iq
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_GEMINI_API_KEY
        sync: false
